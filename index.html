<!DOCTYPE html>
<html lang="en" class="scroll-smooth snap-y snap-mandatory">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VION | Biology. Uninterrupted.</title>

  <!-- Typography Imports -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&family=IBM+Plex+Mono:wght@300;500&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          screens: {
            'xs': '375px',
            '3xl': '1920px',
            'tv': '2560px',
          },
          colors: {
            cosmos: '#082230',
            abyss: '#090C12',
            electro: '#46B3EB',
            oxblood: '#510701',
            synapse: '#FFC300',
            noise: '#F5F7F7',
            medical: '#FFFFFF',
          },
          fontFamily: {
            sans: ['"Switzer"', '"Inter"', 'sans-serif'],
            display: ['"EB Garamond"', 'serif'],
            mono: ['"IBM Plex Mono"', 'monospace'],
          },
          fontSize: {
            'h1': ['clamp(2.5rem, 5vw, 5rem)', { lineHeight: '1.1' }],
            'h2': ['clamp(2rem, 4vw, 3.75rem)', { lineHeight: '1.1' }],
            'body1': ['clamp(1rem, 1.5vw, 1.25rem)', { lineHeight: '1.3', fontWeight: '500' }],
            'body2': ['12px', { lineHeight: '1.3', fontWeight: '500' }],
            'data': ['clamp(0.875rem, 1.2vw, 1.5rem)', { lineHeight: '1.3' }],
          },
          spacing: {
            '18': '4.5rem',
            '26': '6.5rem',
            '42': '10.5rem',
            '68': '17rem',
            'gr-1': '16px',
            'gr-2': '26px',
            'gr-3': '42px',
            'gr-4': '68px',
            'gr-5': '110px',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #082230;
      /* cosmos */
      color: #F5F7F7;
      /* noise */
      overflow-x: hidden;
    }

    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    /* Globally protect images from being dragged, selected, or downloaded */
    img {
      -webkit-user-drag: none;
      -khtml-user-drag: none;
      -moz-user-drag: none;
      -o-user-drag: none;
      user-select: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -o-user-select: none;
      pointer-events: none;
      /* Disables right-click menu entirely */
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "framer-motion": "https://esm.sh/framer-motion@^12.31.0",
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
